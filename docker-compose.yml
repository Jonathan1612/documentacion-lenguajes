services:
  app:
    build: .
    image: ghcr.io/jonathan1612/documentacion-lenguajes:latest
    container_name: documentacion-lenguajes
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - NODE_ENV=production
      - PORT=3000
    labels:
      # HTTP → HTTPS redirect
      - "traefik.enable=true"
      - "traefik.http.routers.docs-http.entrypoints=http"
      - "traefik.http.routers.docs-http.rule=Host(`${FRONTEND_DOMAIN:-docs.jacm.com.mx}`)"
      - "traefik.http.routers.docs-http.middlewares=https-redirect@file"
      
      # HTTPS with SSL
      - "traefik.http.routers.docs-https.entrypoints=https"
      - "traefik.http.routers.docs-https.rule=Host(`${FRONTEND_DOMAIN:-docs.jacm.com.mx}`)"
      - "traefik.http.routers.docs-https.tls=true"
      - "traefik.http.routers.docs-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.docs-https.middlewares=secure-headers@file,rate-limit@file"
      
      # Service configuration
      - "traefik.http.services.docs.loadbalancer.server.port=3000"
    
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    external: true
